server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML/CSS/JS: que Cloudflare NO los cachee (cambian a menudo).
    # Cualquier 304/200 fresco pero rápido — el tunnel es local.
    location ~* \.(html|css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
